name: Build Builder

on:
  push:
    tags:
      - 'builder-v*'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  AR_REPO: cs-build

jobs:
  build:
    name: Build Builder Container
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse Version
        id: config
        run: |
          VERSION="${GITHUB_REF_NAME#builder-}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "::error::Invalid version: $VERSION (expected v<major>.<minor>.<patch>)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build with SLSA provenance
        run: |
          gcloud builds submit \
            "projects/${{ env.PROJECT_ID }}/locations/${{ env.REGION }}/connections/layr-labs/repositories/go-tpm-tools" \
            --revision=${{ github.sha }} \
            --config=builder/cloudbuild-builder.yaml \
            --substitutions="_VERSION=${{ steps.config.outputs.version }},_REGION=${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region=${{ env.REGION }}

      - name: Summary
        if: success()
        run: |
          FULL_IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/builder:${{ steps.config.outputs.version }}"
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          ### Builder Build Complete

          | Property | Value |
          |:--- |:--- |
          | **Version** | \`${{ steps.config.outputs.version }}\` |
          | **Image** | \`${FULL_IMAGE}\` |

          **Provenance:**
          \`\`\`bash
          gcloud artifacts docker images describe $FULL_IMAGE --show-provenance
          \`\`\`
          EOF
