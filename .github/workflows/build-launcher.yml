name: Build Launcher

on:
  push:
    tags:
      - 'launcher-v*'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  build:
    name: Build Launcher
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse Version
        id: config
        run: |
          VERSION="${GITHUB_REF_NAME#launcher-}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "::error::Invalid version: $VERSION (expected v<major>.<minor>.<patch>)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Debug auth
        run: |
          echo "=== Secrets check ==="
          echo "PROJECT_ID set: ${{ secrets.GCP_PROJECT_ID != '' }}"
          echo "SERVICE_ACCOUNT set: ${{ secrets.GCP_SERVICE_ACCOUNT != '' }}"
          echo "PROVIDER set: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}"

          echo "=== Auth result ==="
          echo "Credentials file: ${{ steps.auth.outputs.credentials_file_path }}"

          echo "=== gcloud identity ==="
          gcloud auth list

          echo "=== Test bucket access ==="
          gsutil ls gs://tee-compute-global_cloudbuild/ 2>&1 || true

      - name: Build with SLSA provenance
        run: |
          gcloud builds submit \
            --config=builder/cloudbuild-launcher.yaml \
            --substitutions="_VERSION=${{ steps.config.outputs.version }},_REGION=${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.REGION }}"

      - name: Summary
        if: success()
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cs-build/launcher:${{ steps.config.outputs.version }}"
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          ### Launcher Build Complete

          | Property | Value |
          |:--- |:--- |
          | **Version** | \`${{ steps.config.outputs.version }}\` |
          | **Image** | \`${IMAGE_PATH}\` |
          EOF
