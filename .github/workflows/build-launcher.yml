name: Build Launcher

on:
  push:
    tags:
      - 'launcher-v*'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  build:
    name: Build Launcher
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse Version
        id: config
        run: |
          VERSION="${GITHUB_REF_NAME#launcher-}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "::error::Invalid version: $VERSION (expected v<major>.<minor>.<patch>)"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Debug - Check secrets injection
        run: |
          echo "=== Environment Info ==="
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "Environment: production"

          echo ""
          echo "=== Secrets Presence Check ==="
          echo "GCP_PROJECT_ID is set: ${{ secrets.GCP_PROJECT_ID != '' }}"
          echo "GCP_SERVICE_ACCOUNT is set: ${{ secrets.GCP_SERVICE_ACCOUNT != '' }}"
          echo "GCP_WORKLOAD_IDENTITY_PROVIDER is set: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' }}"

          echo ""
          echo "=== Secret Length Check (non-zero means set) ==="
          echo "GCP_PROJECT_ID length: ${#PROJECT_ID_VAL}"
          echo "GCP_SERVICE_ACCOUNT length: ${#SA_VAL}"
          echo "GCP_WORKLOAD_IDENTITY_PROVIDER length: ${#WIF_VAL}"

          echo ""
          echo "=== Env var from workflow env block ==="
          echo "PROJECT_ID env: '${{ env.PROJECT_ID }}'"

          if [[ -z "$WIF_VAL" ]]; then
            echo "::error::GCP_WORKLOAD_IDENTITY_PROVIDER secret is EMPTY - check that secrets are configured in the 'production' environment"
          fi
        env:
          PROJECT_ID_VAL: ${{ secrets.GCP_PROJECT_ID }}
          SA_VAL: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          WIF_VAL: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          token_format: access_token

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Debug Auth
        run: |
          echo "Authenticated as:"
          gcloud auth list
          echo ""
          echo "Testing serviceusage permission:"
          gcloud services list --enabled --limit=1
          echo ""
          echo "Testing bucket access:"
          gsutil ls gs://${{ env.PROJECT_ID }}_cloudbuild/ | head -5 || echo "Bucket access failed"
          echo ""
          echo "Testing write to bucket:"
          echo "test" | gsutil cp - gs://${{ env.PROJECT_ID }}_cloudbuild/debug-test.txt && echo "Write succeeded" || echo "Write failed"
          gsutil rm gs://${{ env.PROJECT_ID }}_cloudbuild/debug-test.txt 2>/dev/null || true

      - name: Build with SLSA provenance
        run: |
          gcloud builds submit \
            --config=builder/cloudbuild-launcher.yaml \
            --substitutions="_VERSION=${{ steps.config.outputs.version }},_REGION=${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}"

      - name: Summary
        if: success()
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cs-build/launcher:${{ steps.config.outputs.version }}"
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          ### Launcher Build Complete

          | Property | Value |
          |:--- |:--- |
          | **Version** | \`${{ steps.config.outputs.version }}\` |
          | **Image** | \`${IMAGE_PATH}\` |
          EOF
