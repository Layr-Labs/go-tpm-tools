substitutions:
  '_IMAGE_NAME': ''
  '_IMAGE_PROJECT': ''
  '_CLEANUP': 'true'
  '_VM_NAME_PREFIX': 'oda-signedcontainer'
  '_ZONE': 'us-central1-a'
  # If the workload image changes, re-sign it with:
  #   cosign sign --key gcpkms://projects/tee-compute-global/locations/global/keyRings/cosign-test/cryptoKeys/ecdsa/cryptoKeyVersions/1 \
  #     -y --tlog-upload=false <IMAGE>@sha256:<DIGEST>
  '_WORKLOAD_IMAGE': 'us-central1-docker.pkg.dev/tee-compute-global/cs-test/ipc/happypath@sha256:c7e8b1878fc50231c7b0079ff2579fc6f707445f41e112cfe77ce045b1eb4f70'
  '_IMAGE_REPO': 'us-central1-docker.pkg.dev/tee-compute-global/cs-test'
  '_EXPECTED_SIG': 'MEUCIQDb3WXW20wYV0GFFQAuFRgq8YrO+vekNxkgDwvlSJpbEAIgdgEsjjA+Ty+9GBN7UMMEq6FISefkn76E0cDepUvwNh4='

steps:
- name: 'gcr.io/cloud-builders/gcloud'
  id: CreateVM
  entrypoint: 'bash'
  env:
  - 'BUILD_ID=$BUILD_ID'
  args: ['create_vm.sh','-i', '${_IMAGE_NAME}',
          '-p', '${_IMAGE_PROJECT}',
          '-m', 'tee-image-reference=${_WORKLOAD_IMAGE},tee-container-log-redirect=true,tee-signed-image-repos=${_IMAGE_REPO},tee-env-ALLOWED_OVERRIDE=overridden,tee-cmd=["newCmd"]',
          '-n', '${_VM_NAME_PREFIX}-${BUILD_ID}',
          '-z', '${_ZONE}',
        ]
- name: 'gcr.io/cloud-builders/gcloud'
  id: TestCustomToken
  entrypoint: 'bash'
  args: ['scripts/test_custom_token.sh', "true", '${_VM_NAME_PREFIX}-${BUILD_ID}', '${_ZONE}']
- name: 'gcr.io/cloud-builders/gcloud'
  id: BasicDiscoverSignaturesTest
  entrypoint: 'bash'
  # Check how many times container image signatures is being logged. 
  # Since signature logging will occur on refresh the default token, and on attest agent calling the `Attest` method, so the expected number should be 3.
  # This also checks the fetched signatures are the same.
  args: ['scripts/test_launcher_workload_discover_signatures.sh', '${_VM_NAME_PREFIX}-${BUILD_ID}', '${_ZONE}', '${_EXPECTED_SIG}', '3']
- name: 'gcr.io/cloud-builders/gcloud'
  id: CleanUp
  entrypoint: 'bash'
  env:
  - 'CLEANUP=$_CLEANUP'
  args: ['cleanup.sh', '${_VM_NAME_PREFIX}-${BUILD_ID}', '${_ZONE}']
# Must come after cleanup.
- name: 'gcr.io/cloud-builders/gcloud'
  id: CheckFailure
  entrypoint: 'bash'
  env:
  - 'BUILD_ID=$BUILD_ID'
  args: ['check_failure.sh']
