substitutions:
  '_IMAGE_NAME': ''
  '_IMAGE_PROJECT': ''
  '_CLEANUP': 'true'
  '_VM_NAME_PREFIX': 'oda-signedcontainer'
  '_ZONE': 'us-central1-a'
  '_WORKLOAD_IMAGE': 'us-central1-docker.pkg.dev/tee-compute-global/cs-test/ipc/happypath@sha256:c7e8b1878fc50231c7b0079ff2579fc6f707445f41e112cfe77ce045b1eb4f70'
  '_IMAGE_REPO': 'us-central1-docker.pkg.dev/tee-compute-global/cs-test/ipc/happypath'

steps:
- name: 'gcr.io/projectsigstore/cosign:v2.2.0'
  id: SignContainer
  entrypoint: 'sh'
  env:
  - 'BUILD_ID=$BUILD_ID'
  args:
  - -c
  - |
    # Unpadded base64 encoding on the CloudKMS public key
    pub=$(cosign public-key --key gcpkms://projects/tee-compute-global/locations/global/keyRings/cosign-test/cryptoKeys/ecdsa/cryptoKeyVersions/1 | openssl base64)
    pub=$(echo $pub | tr -d '[:space:]' | sed 's/[=]*$//')
    # Sign container (signatures stored in same repo as image by default)
    cosign sign --key gcpkms://projects/tee-compute-global/locations/global/keyRings/cosign-test/cryptoKeys/ecdsa/cryptoKeyVersions/1 -y --tlog-upload=false ${_WORKLOAD_IMAGE} -a dev.cosignproject.cosign/sigalg=ECDSA_P256_SHA256 -a dev.cosignproject.cosign/pub=$pub
- name: 'gcr.io/cloud-builders/gcloud'
  id: CreateVM
  entrypoint: 'bash'
  env:
  - 'BUILD_ID=$BUILD_ID'
  args: ['create_vm.sh','-i', '${_IMAGE_NAME}',
          '-p', '${_IMAGE_PROJECT}',
          '-m', 'tee-image-reference=${_WORKLOAD_IMAGE},tee-container-log-redirect=true,tee-signed-image-repos=${_IMAGE_REPO},tee-env-ALLOWED_OVERRIDE=overridden,tee-cmd=["newCmd"]',
          '-n', '${_VM_NAME_PREFIX}-${BUILD_ID}',
          '-z', '${_ZONE}',
        ]
- name: 'gcr.io/cloud-builders/gcloud'
  id: TestCustomToken
  entrypoint: 'bash'
  args: ['scripts/test_custom_token.sh', "true", '${_VM_NAME_PREFIX}-${BUILD_ID}', '${_ZONE}']
- name: 'gcr.io/cloud-builders/gcloud'
  id: BasicDiscoverSignaturesTest
  entrypoint: 'bash'
  # Check that container image signatures are discovered and logged during Attest calls.
  # Expected count of 2: initial token fetch (1) + custom token test above (1).
  args: ['scripts/test_launcher_workload_discover_signatures.sh', '${_VM_NAME_PREFIX}-${BUILD_ID}', '${_ZONE}', 'Found container image signatures', '2']
- name: 'gcr.io/cloud-builders/gcloud'
  id: CleanUp
  entrypoint: 'bash'
  env:
  - 'CLEANUP=$_CLEANUP'
  args: ['cleanup.sh', '${_VM_NAME_PREFIX}-${BUILD_ID}', '${_ZONE}']
- name: 'gcr.io/cloud-builders/gcloud'
  id: DeleteContainerSignatures
  env:
  - 'BUILD_ID=$BUILD_ID'
  entrypoint: 'bash'
  args:
  - -c
  - |
    echo "Deleting container signatures..."
    digest=$(gcloud artifacts docker images describe ${_WORKLOAD_IMAGE} --format 'value(image_summary.digest)')
    tag=${digest/":"/"-"}.sig
    # Delete container signature by its tag (stored in same repo as image)
    gcloud artifacts docker images delete -q ${_IMAGE_REPO}:${tag} || echo "Signature already deleted or not found"
# Must come after cleanup.
- name: 'gcr.io/cloud-builders/gcloud'
  id: CheckFailure
  entrypoint: 'bash'
  env:
  - 'BUILD_ID=$BUILD_ID'
  args: ['check_failure.sh']
