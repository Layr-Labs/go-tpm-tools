#   script: |
#     #!/usr/bin/env bash
#     echo "running ingress network tests on ${IMAGE_NAME}"
#     gcloud builds submit --config=test_ingress_network.yaml --region us-central1 \
#       --substitutions _IMAGE_NAME=${IMAGE_NAME},_IMAGE_PROJECT=${IMAGE_PROJECT}

- name: 'gcr.io/cloud-builders/gcloud'
  id: DiscoverSignaturesTests
  env:
  - 'IMAGE_NAME=${_IMAGE_NAME}'
  - 'IMAGE_PROJECT=${_IMAGE_PROJECT}'
  script: |
    #!/usr/bin/env bash
    echo "running container signature tests on ${IMAGE_NAME}"
    gcloud builds submit --config=test_discover_signatures.yaml --region us-central1 \
      --substitutions _IMAGE_NAME=${IMAGE_NAME},_IMAGE_PROJECT=${IMAGE_PROJECT}

# Debug-specific tests
- name: 'gcr.io/cloud-builders/gcloud'
  id: DebugImageTests
  env:
  - 'IMAGE_NAME=${_IMAGE_NAME}'
  - 'IMAGE_PROJECT=${_IMAGE_PROJECT}'
  script: |
    #!/usr/bin/env bash
    if [[ "${IMAGE_NAME}" != *"debug"* ]]; then
      echo "Skipping debug tests (not a debug image)"
      exit 0
    fi
    echo "running debug image tests on ${IMAGE_NAME}"
    gcloud builds submit --config=test_debug_cloudbuild.yaml --region us-central1 \
      --substitutions _IMAGE_NAME=${IMAGE_NAME},_IMAGE_PROJECT=${IMAGE_PROJECT}

