substitutions:
  '_IMAGE_NAME': ''
  '_IMAGE_PROJECT': ''

steps:
# Common tests (both debug and hardened)
- name: 'gcr.io/cloud-builders/gcloud'
  id: HttpServerTests
  env:
  - 'IMAGE_NAME=${_IMAGE_NAME}'
  - 'IMAGE_PROJECT=${_IMAGE_PROJECT}'
  script: |
    #!/usr/bin/env bash
    echo "running http server tests on ${IMAGE_NAME}"
    gcloud builds submit --config=test_http_server.yaml --region us-central1 \
      --substitutions _IMAGE_NAME=${IMAGE_NAME},_IMAGE_PROJECT=${IMAGE_PROJECT}

# Skipped: NetworkIngressTests requires a private Cloud Build pool in the same VPC
# as the test VM to reach internal IPs. Re-enable once a private pool is configured.
# - name: 'gcr.io/cloud-builders/gcloud'
#   id: NetworkIngressTests
#   env:
#   - 'IMAGE_NAME=${_IMAGE_NAME}'
