# Cloud Build configuration for building the CS builder container with SLSA provenance.
# This enables full provenance chain: source code -> builder container -> GCE image.
#
# Usage:
#   gcloud builds submit --config=research/builder/cloudbuild-builder.yaml \
#     --substitutions=_VERSION=v0.5.0 \
#     --project=${PROJECT_ID}

steps:
  # Build the builder container
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/builders/cs-builder:${_VERSION}'
      - '-f'
      - 'research/builder/Dockerfile'
      - 'research/builder/'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/builders/cs-builder:${_VERSION}'

options:
  # Enable SLSA provenance generation
  requestedVerifyOption: VERIFIED

substitutions:
  _VERSION: 'latest'
  _REGION: 'us-central1'

timeout: '600s'
