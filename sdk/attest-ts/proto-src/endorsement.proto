// Endorsement protobuf definitions from gce-tcb-verifier.
// Source: github.com/google/gce-tcb-verifier/proto/endorsement/endorsement.proto
syntax = "proto3";

package cloud_vmm_proto;

import "google/protobuf/timestamp.proto";

message VMLaunchEndorsement {
  bytes serialized_uefi_golden = 1;
  bytes signature = 2;
}

message VMGoldenMeasurement {
  google.protobuf.Timestamp timestamp = 1;
  uint64 cl_spec = 2;
  bytes commit = 3;
  // DER format certificate of the key that signed this document.
  bytes cert = 4;
  // SHA-384 digest of the UEFI binary without TEE-specifics about launch.
  bytes digest = 5;
  // PEM-encoded certificates of keys used in cert in Root ... final intermediate order.
  bytes ca_bundle = 6;
  VMSevSnp sev_snp = 7;
  VMTdx tdx = 8;
}

message VMSevSnp {
  uint32 svn = 1;
  // Expected MEASUREMENT report field values given [key]-many VMSAs at launch.
  map<uint32, bytes> measurements = 2;
  bytes family_id = 3;
  bytes image_id = 4;
  uint64 policy = 5;
  bytes ca_bundle = 6;
  bytes svsm_measurement = 7;
}

message VMTdx {
  message Measurement {
    uint32 ram_gib = 1;
    bool early_accept = 2;
    bytes mrtd = 3;
  }
  uint32 svn = 1;
  repeated Measurement measurements = 2;
}
